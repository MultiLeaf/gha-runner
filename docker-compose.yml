services:
  github-runner:
    build:
      context: .
      args:
        RUNNER_VERSION: ${RUNNER_VERSION:-2.335.1}
        UBUNTU_VERSION: ${UBUNTU_VERSION:-24.04}
    environment:
      - REPO_URL=${REPO_URL}
      - REGISTRATION_TOKEN=${REGISTRATION_TOKEN}
      - GITHUB_PAT=${GITHUB_PAT}
      - RUNNER_NAME=${RUNNER_NAME:-docker-runner}
      - RUNNER_LABELS=${RUNNER_LABELS:-docker,linux}
      - EPHEMERAL=${EPHEMERAL:-false}
      - DISABLE_UPDATE=${DISABLE_UPDATE:-true}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner_work:/runner/_work
      - runner_toolcache:/opt/hostedtoolcache
    group_add:
      - "${DOCKER_GID:?Set DOCKER_GID to the host docker.sock group ID (stat -c '%g' /var/run/docker.sock)}"
    restart: unless-stopped
    privileged: true
    # Graceful shutdown waits for the runner to finish its own job cancellation,
    # then makes 1-2 GitHub API calls to fetch a fresh removal token and
    # deregister. Docker's 10s default is too short for that and would SIGKILL
    # mid-shutdown, leaving the runner registered as "offline" — the exact
    # failure mode this is meant to avoid.
    stop_grace_period: 60s
    # Bounds the runner process itself (git/npm/build-tool memory and CPU use)
    # against accidental runaway jobs. Does NOT sandbox `docker build`/`docker run`
    # invoked by a job: those run as sibling containers on the host's dockerd via
    # the mounted socket, outside this container's cgroup entirely. Combined with
    # --privileged, these limits are not an adversarial security boundary against
    # a malicious job — only protection against accidental resource exhaustion.
    # See README "Resource Limits" for details.
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "${RUNNER_CPU_LIMIT:-2}"
          memory: ${RUNNER_MEMORY_LIMIT:-4G}
          pids: ${RUNNER_PIDS_LIMIT:-512}

volumes:
  runner_work:
  runner_toolcache: