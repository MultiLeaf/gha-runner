name: Build and Push x64 Runner Image

on:
  workflow_dispatch:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC

env:
  DOCKERHUB_IMAGE: multileaf/gh-runner

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Lint entrypoint.sh
        run: docker run --rm -v "$PWD":/mnt koalaman/shellcheck:stable /mnt/entrypoint.sh

  determine-runner:
    runs-on: ubuntu-latest
    environment: default
    outputs:
      runner: ${{ steps.set-runner.outputs.use-runner }}
    steps:
      - name: Determine which runner to use
        id: set-runner
        uses: jimmygchen/runner-fallback-action@v0.1.1
        with:
          primary-runner: "self-hosted"
          fallback-runner: "ubuntu-latest"
          github-token: ${{ secrets.YOUR_GITHUB_TOKEN }}

  build-x64:
    needs: [lint, determine-runner]
    runs-on: ${{ fromJson(needs.determine-runner.outputs.runner) }}
    environment: default
    permissions:
      contents: read
      id-token: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest runner version
        id: runner-version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/actions/runner/releases/latest | jq -r .tag_name)
          VERSION_NUMBER=$(echo "$LATEST_VERSION" | sed 's/^v//')
          TARBALL="actions-runner-linux-x64-${VERSION_NUMBER}.tar.gz"
          SHA256=$(curl -s "https://api.github.com/repos/actions/runner/releases/tags/${LATEST_VERSION}" \
            | jq -r --arg name "$TARBALL" '.assets[] | select(.name == $name) | .digest' | sed 's/^sha256://')
          echo "version=$VERSION_NUMBER" >> $GITHUB_OUTPUT
          echo "tag=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Latest runner version: $LATEST_VERSION (sha256: $SHA256)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ steps.runner-version.outputs.version }}-x64
            type=raw,value=latest-x64

      - name: Build image for smoke test
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNNER_VERSION=${{ steps.runner-version.outputs.version }}
            RUNNER_SHA256=${{ steps.runner-version.outputs.sha256 }}
            GIT_SHA=${{ github.sha }}
            TARGETARCH=amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve local image tag
        id: local-tag
        run: echo "tag=$(echo "${{ steps.meta.outputs.tags }}" | head -1)" >> "$GITHUB_OUTPUT"

      - name: Smoke test image
        run: |
          docker run --rm --entrypoint bash "${{ steps.local-tag.outputs.tag }}" -c '
            set -e
            ./bin/Runner.Listener --version
            if command -v sudo; then echo "sudo found, should not be installed"; exit 1; fi
            command -v tini
            test "$(id -un)" = "runner"
            echo "Smoke test passed"
          '

      # Scan the locally-loaded (not-yet-published) image so a fixable CRITICAL
      # finding blocks the push below, instead of the vulnerable image already
      # being public by the time a post-push scan would fail the job.
      - name: Scan image for vulnerabilities (report)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: "${{ steps.local-tag.outputs.tag }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: "${{ steps.local-tag.outputs.tag }}"
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNNER_VERSION=${{ steps.runner-version.outputs.version }}
            RUNNER_SHA256=${{ steps.runner-version.outputs.sha256 }}
            GIT_SHA=${{ github.sha }}
            TARGETARCH=amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${{ env.DOCKERHUB_IMAGE }}@${{ steps.push.outputs.digest }}"

      - name: Generate summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: x64 (linux/amd64)" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner Version**: ${{ steps.runner-version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner SHA256**: ${{ steps.runner-version.outputs.sha256 }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Digest**: ${{ steps.push.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tags**:" >> $GITHUB_STEP_SUMMARY
          echo "  - \`${{ env.DOCKERHUB_IMAGE }}:${{ steps.runner-version.outputs.version }}-x64\`" >> $GITHUB_STEP_SUMMARY
          echo "  - \`${{ env.DOCKERHUB_IMAGE }}:latest-x64\`" >> $GITHUB_STEP_SUMMARY
